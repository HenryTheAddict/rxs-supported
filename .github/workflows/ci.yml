name: ci

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev libssl-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libuv openssl

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: vcpkg install libuv:x64-windows openssl:x64-windows

      - name: Configure
        shell: bash
        run: |
          extra_args=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            extra_args="-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -A x64"
          fi
          cmake -S . -B build $extra_args -DCMAKE_BUILD_TYPE=Release -DWITH_HWLOC=OFF

      - name: Build
        run: cmake --build build --config Release --parallel
